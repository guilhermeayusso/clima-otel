version: "3.9"

services:
  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    ports:
      - "9411:9411"

  otel-collector:
    image: otel/opentelemetry-collector:0.108.0
    container_name: otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/otel-collector/config.yaml:/etc/otel/config.yaml
    ports:
      - "4318:4318"
      - "4317:4317"
    depends_on:
      - zipkin

  service-b:
    build:
      context: ./service-b
      dockerfile: Dockerfile
    container_name: service-b
    environment:
      WEATHER_API_KEY: e91c7c7e5125499a809184601261902
      OTEL_COLLECTOR_URL: otel-collector:4318
    ports:
      - "8081:8081"
    depends_on:
      - otel-collector

  service-a:
    build:
      context: ./service-a
      dockerfile: Dockerfile
    container_name: service-a
    environment:
      SERVICE_B_URL: http://service-b:8081
      OTEL_COLLECTOR_URL: otel-collector:4318
    ports:
      - "8080:8080"
    depends_on:
      - service-b